<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid #2a2a4a;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header-left p {
      font-size: 0.8rem;
      color: #6b6b9a;
      margin-top: 2px;
    }

    #refresh-info {
      font-size: 0.85rem;
      color: #7c7caa;
      background: #1e1e3a;
      border: 1px solid #2e2e5a;
      border-radius: 20px;
      padding: 6px 16px;
      white-space: nowrap;
    }

    #refresh-info span {
      color: #a78bfa;
      font-weight: 600;
    }

    /* ── Search ── */
    .search-wrapper {
      max-width: 560px;
      margin: 32px auto 0;
      padding: 0 24px;
      position: relative;
    }

    #search-input {
      width: 100%;
      padding: 14px 20px;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 14px;
      color: #e0e0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #search-input::placeholder { color: #4a4a6a; }

    #search-input:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }

    #search-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 24px;
      right: 24px;
      background: #1e1e38;
      border: 1px solid #2e2e5a;
      border-radius: 12px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      display: none;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .dropdown-item:hover { background: #2a2a4a; }

    .dropdown-item img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .dropdown-item .di-name { font-size: 0.9rem; color: #d0d0f0; }
    .dropdown-item .di-sym  { font-size: 0.75rem; color: #7070a0; margin-left: 4px; text-transform: uppercase; }

    .dropdown-item .di-added {
      margin-left: auto;
      font-size: 0.7rem;
      color: #4a4a6a;
      background: #14142a;
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 28px auto 0;
      padding: 0 24px;
    }

    /* ── Card gradients (8 colours rotating) ── */
    .card { --g1: #7c3aed; --g2: #4f46e5; }
    .card[data-ci="1"] { --g1: #db2777; --g2: #7c3aed; }
    .card[data-ci="2"] { --g1: #0891b2; --g2: #2563eb; }
    .card[data-ci="3"] { --g1: #059669; --g2: #0891b2; }
    .card[data-ci="4"] { --g1: #d97706; --g2: #dc2626; }
    .card[data-ci="5"] { --g1: #be185d; --g2: #9333ea; }
    .card[data-ci="6"] { --g1: #0d9488; --g2: #059669; }
    .card[data-ci="7"] { --g1: #2563eb; --g2: #0891b2; }

    .card {
      position: relative;
      background: linear-gradient(135deg, var(--g1) 0%, var(--g2) 100%);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.05);
      border-radius: inherit;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 10px 36px rgba(0,0,0,0.5);
    }

    .card-remove {
      position: absolute;
      top: 10px;
      right: 12px;
      background: rgba(0,0,0,0.3);
      border: none;
      color: rgba(255,255,255,0.7);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .card-remove:hover { background: rgba(220,50,50,0.7); color: #fff; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .card-top img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }

    .card-top .coin-name  { font-size: 1rem; font-weight: 700; color: #fff; line-height: 1.2; }
    .card-top .coin-sym   { font-size: 0.72rem; color: rgba(255,255,255,0.65); text-transform: uppercase; }

    .card-price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .card-change {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .card-change.up   { background: rgba(52,211,153,0.25); color: #6ee7b7; }
    .card-change.down { background: rgba(248,113,113,0.25); color: #fca5a5; }
    .card-change.flat { background: rgba(255,255,255,0.1);  color: rgba(255,255,255,0.7); }

    .card-loading {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
    }

    /* ── Empty state ── */
    #empty-state {
      text-align: center;
      color: #3a3a5a;
      margin-top: 80px;
      display: none;
    }

    #empty-state svg { opacity: 0.4; margin-bottom: 16px; }
    #empty-state p   { font-size: 1rem; }

    /* ── Error toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #3b1f1f;
      border: 1px solid #7f3535;
      color: #fca5a5;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      transition: transform 0.3s;
      z-index: 200;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>&#9728; Crypto Dashboard</h1>
    <p>Live prices powered by CoinGecko</p>
  </div>
  <div id="refresh-info">Refreshes in <span id="countdown">60</span>s</div>
</header>

<div class="search-wrapper">
  <input id="search-input" type="text" placeholder="Search for a coin (e.g. Bitcoin)..." autocomplete="off" />
  <div id="dropdown"></div>
</div>

<div id="grid"></div>

<div id="empty-state">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
  </svg>
  <p>Search for a coin above to get started.</p>
</div>

<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'crypto_dashboard_coins';
  const REFRESH_INTERVAL = 60; // seconds

  let trackedCoins = [];   // [{ id, name, symbol, image }]
  let priceData    = {};   // { id: { price, change } }
  let countdown    = REFRESH_INTERVAL;
  let searchTimer  = null;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(trackedCoins));
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function formatPrice(n) {
    if (n === null || n === undefined) return '—';
    if (n >= 1000) return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2 });
    if (n >= 1)    return '$' + n.toFixed(4);
    return '$' + n.toPrecision(4);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Rendering ──────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid   = document.getElementById('grid');
    const empty  = document.getElementById('empty-state');
    grid.innerHTML = '';

    if (trackedCoins.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    trackedCoins.forEach((coin, idx) => {
      const ci    = idx % 8;
      const pd    = priceData[coin.id];
      const price = pd ? formatPrice(pd.price) : '…';
      const chg   = pd ? pd.change : null;

      let chgHtml;
      if (chg === null || chg === undefined) {
        chgHtml = '<span class="card-change flat">— %</span>';
      } else if (chg >= 0) {
        chgHtml = `<span class="card-change up">&#9650; ${chg.toFixed(2)}%</span>`;
      } else {
        chgHtml = `<span class="card-change down">&#9660; ${Math.abs(chg).toFixed(2)}%</span>`;
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.ci  = ci;
      card.dataset.id  = coin.id;
      card.innerHTML = `
        <button class="card-remove" title="Remove">&#10005;</button>
        <div class="card-top">
          <img src="${coin.image || ''}" alt="${coin.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><circle cx=%2218%22 cy=%2218%22 r=%2218%22 fill=%22rgba(255,255,255,.2)%22/></svg>'"/>
          <div>
            <div class="coin-name">${coin.name}</div>
            <div class="coin-sym">${coin.symbol}</div>
          </div>
        </div>
        <div class="card-price">${price}</div>
        ${chgHtml}
      `;

      card.querySelector('.card-remove').addEventListener('click', () => removeCoin(coin.id));
      grid.appendChild(card);
    });
  }

  function updatePricesInCards() {
    document.querySelectorAll('#grid .card').forEach(card => {
      const id  = card.dataset.id;
      const pd  = priceData[id];
      if (!pd) return;

      card.querySelector('.card-price').textContent = formatPrice(pd.price);

      const chg = pd.change;
      let chgEl = card.querySelector('.card-change');
      if (!chgEl) {
        chgEl = document.createElement('span');
        card.appendChild(chgEl);
      }

      if (chg === null || chg === undefined) {
        chgEl.className = 'card-change flat';
        chgEl.innerHTML = '— %';
      } else if (chg >= 0) {
        chgEl.className = 'card-change up';
        chgEl.innerHTML = `&#9650; ${chg.toFixed(2)}%`;
      } else {
        chgEl.className = 'card-change down';
        chgEl.innerHTML = `&#9660; ${Math.abs(chg).toFixed(2)}%`;
      }
    });
  }

  // ── API calls ──────────────────────────────────────────────────────────────
  async function fetchPrices() {
    if (trackedCoins.length === 0) return;
    const ids = trackedCoins.map(c => c.id).join(',');
    try {
      const res = await fetch(
        `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&sparkline=false`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      data.forEach(coin => {
        priceData[coin.id] = {
          price:  coin.current_price,
          change: coin.price_change_percentage_24h
        };
      });
      updatePricesInCards();
    } catch (e) {
      console.error('fetchPrices error', e);
      showToast('Failed to fetch prices. Check your connection.');
    }
  }

  async function searchCoins(query) {
    if (!query.trim()) { closeDropdown(); return; }
    try {
      const res  = await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(query)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderDropdown(data.coins.slice(0, 8));
    } catch (e) {
      console.error('searchCoins error', e);
    }
  }

  // ── Dropdown ───────────────────────────────────────────────────────────────
  function renderDropdown(coins) {
    const dd = document.getElementById('dropdown');
    if (coins.length === 0) { closeDropdown(); return; }

    dd.innerHTML = '';
    coins.forEach(coin => {
      const alreadyAdded = trackedCoins.some(c => c.id === coin.id);
      const item = document.createElement('div');
      item.className = 'dropdown-item';
      item.innerHTML = `
        <img src="${coin.thumb || ''}" alt="${coin.name}" onerror="this.style.visibility='hidden'"/>
        <span class="di-name">${coin.name}</span>
        <span class="di-sym">${coin.symbol}</span>
        ${alreadyAdded ? '<span class="di-added">Added</span>' : ''}
      `;
      if (!alreadyAdded) {
        item.addEventListener('click', () => addCoin(coin));
      }
      dd.appendChild(item);
    });

    dd.style.display = 'block';
  }

  function closeDropdown() {
    document.getElementById('dropdown').style.display = 'none';
  }

  // ── Coin management ────────────────────────────────────────────────────────
  function addCoin(coin) {
    if (trackedCoins.some(c => c.id === coin.id)) return;

    // CoinGecko search returns `thumb`; we want a larger image.
    // The large image URL pattern: replace /thumb/ with /small/ or just use thumb.
    const image = (coin.large || coin.small || coin.thumb || '');

    trackedCoins.push({ id: coin.id, name: coin.name, symbol: coin.symbol, image });
    save();
    renderGrid();
    fetchPrices();

    document.getElementById('search-input').value = '';
    closeDropdown();
  }

  function removeCoin(id) {
    trackedCoins = trackedCoins.filter(c => c.id !== id);
    delete priceData[id];
    save();
    renderGrid();
  }

  // ── Auto-refresh ───────────────────────────────────────────────────────────
  function startAutoRefresh() {
    countdown = REFRESH_INTERVAL;
    updateCountdown();

    setInterval(async () => {
      countdown--;
      if (countdown <= 0) {
        countdown = REFRESH_INTERVAL;
        await fetchPrices();
      }
      updateCountdown();
    }, 1000);
  }

  function updateCountdown() {
    document.getElementById('countdown').textContent = countdown;
  }

  // ── Search input handling ──────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (!q) { closeDropdown(); return; }
    searchTimer = setTimeout(() => searchCoins(q), 300);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrapper')) closeDropdown();
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeDropdown(); }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  (async function init() {
    trackedCoins = load();
    renderGrid();
    if (trackedCoins.length > 0) await fetchPrices();
    startAutoRefresh();
  })();
</script>
</body>
</html>
